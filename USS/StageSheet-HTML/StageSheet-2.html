<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>StageSheet Template</title>
    <style>
      .StageSheet-Container {
        max-width: 1200px;
        margin: auto;
        padding: 10px;
        padding-top: 0px;
        border: 1px solid black;
        font-size: 12px;
        font-family: "Helvetica Neue", "Helvetica", Helvetica, Arial, sans-serif;
        color: black;
      }

      .StageSheet-Grid {
        width: 95%;
        table-layout: fixed;
        margin-top: 25px;
        text-align: left;
      }

      .StageSheet-Grid-XSm {
        width: 50px !important;
      }

      .StageSheet-Grid-Sm {
        width: 50px !important;
      }

      .StageSheet-Grid-Md {
        width: 80px !important;
      }

      .StageSheet-Grid-Lg {
        width: 110px !important;
      }

      .StageSheet-Grid-XLg {
        width: 130px;
      }

      tr,
      th,
      td {
        padding: 5px;
        text-align: left;
        border-left: 1px solid #dee2e6;
        border-top: 1px solid #dee2e6;
      }

      .border-right {
        border-right: 1px solid #dee2e6;
        border-right: 1px solid #dee2e6;
      }

      .border-bottom {
        border-bottom: 1px solid #dee2e6;
      }

      .br {
        border-left: 1px solid #dee2e6;
      }

      tr:nth-child(even) {
        background-color: #f2f2f2;
      }

      .empty-row {
        height: 15px;
      }
    </style>
  </head>

  <body>
    <div class="StageSheet-Container">
      <table class="StageSheet-Grid" cellspacing="0" cellpadding="0">
        <tr>
          <th class="StageSheet-Grid-XSm border-bottom">Stn #</th>
          <th class="StageSheet-Grid-Sm border-bottom">Box</th>
          <th class="StageSheet-Grid-Sm border-bottom">Weight</th>
          <th class="StageSheet-Grid-Lg border-bottom">Type</th>
          <th class="StageSheet-Grid-XLg border-bottom">Pad Location</th>
          <th class="StageSheet-Grid-Md border-bottom">Remaining Wt.</th>
          <th class="StageSheet-Grid-Lg border-bottom">Total Wt.</th>
          <th class="StageSheet-Grid-Lg border-bottom">Sand Req.</th>
          <th class="StageSheet-Grid-Lg border-bottom border-right">Cut Sand</th>
        </tr>

        {{#each this}}
        <tr>
          <td class="StageSheet-Grid-XSm">{{Station}}</td>
          <td class="StageSheet-Grid-Sm">{{BoxDesc}}</td>
          <td class="StageSheet-Grid-Sm">{{BoxWeight}}</td>
          <td class="StageSheet-Grid-Lg">{{Proppant}}</td>
          <td class="StageSheet-Grid-XLg">{{Location}}</td>
          <td class="StageSheet-Grid-XLg">{{BoxWeightRemaining}}</td>
          {{#if IsFirstItem}}
          <td class="StageSheet-Grid-Md" rowspan="{{RowCount}}">
            {{TotalWeight}}
          </td>
          <td class="StageSheet-Grid-Lg" rowspan="{{RowCount}}">
            {{SandRequired}}
          </td>
          <td class="StageSheet-Grid-Lg border-right" rowspan="{{RowCount}}">
            {{TotalWeight - SandRequired}}
          </td>
          {{/if}}
        </tr>
        {{/each}}
      </table>
    </div>
  </body>
</html>
